name: Deploy with CARS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: coolcert-ui-cars
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build CARS artifact
        run: npx cars build 1

      - name: Check CARS transport
        run: |
          set -euo pipefail
          getent hosts cars.babbage.systems
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 \
            https://cars.babbage.systems/health/live >/dev/null
          node --input-type=module -e 'try { const response = await fetch("https://cars.babbage.systems/.well-known/auth", { method: "POST", headers: { "content-type": "application/json" }, body: "{}" }); console.log(`CARS auth endpoint responded with HTTP ${response.status}`); } catch (error) { console.error(error); console.error("cause", error.cause); process.exit(1); }'

      - name: Deploy CARS release
        env:
          CARS_PRIVATE_KEY: ${{ secrets.CARS_PRIVATE_KEY }}
          CARS_WALLET_STORAGE: ${{ secrets.CARS_WALLET_STORAGE }}
        run: |
          set -euo pipefail

          if [ -z "$CARS_PRIVATE_KEY" ]; then
            echo "CARS_PRIVATE_KEY repository secret is required." >&2
            exit 1
          fi

          storage_args=()
          if [ -n "$CARS_WALLET_STORAGE" ]; then
            storage_args=(--storage "$CARS_WALLET_STORAGE")
          fi

          for attempt in 1 2 3; do
            if npx cars release now 1 \
              --key "$CARS_PRIVATE_KEY" \
              --network mainnet \
              "${storage_args[@]}"; then
              exit 0
            fi

            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep "$((attempt * 20))"
          done
